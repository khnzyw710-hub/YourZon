name: 🚀 Deploy YourZon Glassmorphism Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: ⚙️ Enable GitHub Pages (if not enabled)
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.createPagesSite({
                owner: context.repo.owner,
                repo: context.repo.repo,
                source: { branch: 'gh-pages', path: '/' }
              });
              core.info('✅ GitHub Pages enabled!');
            } catch (e) {
              if (e.status === 409) {
                core.info('ℹ️ Pages already enabled, continuing...');
              } else {
                core.warning(`Pages setup: ${e.message}`);
              }
            }

      - name: 📄 Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: 📦 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🌐 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
