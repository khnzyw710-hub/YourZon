name: Enable GitHub Pages for YourZon Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  enable-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Enable GitHub Pages from gh-pages branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            try {
              const result = await github.rest.repos.createPagesSite({
                owner,
                repo,
                source: {
                  branch: 'gh-pages',
                  path: '/'
                }
              });
              core.info(`Pages enabled! URL: ${result.data.html_url}`);
            } catch (e) {
              if (e.status === 409) {
                core.info('Pages already configured.');
              } else {
                core.setFailed(`Failed: ${e.message}`);
              }
            }
